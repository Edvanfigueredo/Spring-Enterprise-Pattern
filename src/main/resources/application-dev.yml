spring:
  datasource:
    url: jdbc:h2:mem:enterprise
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true

  jpa:
    hibernate:
      ddl-auto: validate

    show-sql: true

    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true

springdoc:
  swagger-ui:
    path: /swagger